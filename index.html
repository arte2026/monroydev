<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Guillermo R. Monroy — Web developer and 3D modeling enthusiast. Showcasing creative Android and Microsoft Store Aplications, modern portfolio designs, and interactive 3D projects built with Blender." />
    <title>Developer Profile | Guillermo R. Monroy</title>
    <link rel="stylesheet" type="text/css" href="style.css">

    <script type="module" src="model-viewer.min.js"></script>
</head>
<body>

    <div class="model-container">
        <model-viewer 
            src="model.glb" 
            alt="Interactive 3D Portfolio Cube" 
            camera-controls 
            disable-pan
            auto-rotate 
            camera-orbit="0deg 90deg 13m"
            disable-zoom
            rotation-per-second="10deg"
            shadow-intensity="3"
            interaction-prompt="auto"
            disable-tap>
        </model-viewer>
    </div>

</body>
</html>
