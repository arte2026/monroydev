<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Guillermo — 3D Profile</title>
  <style>
      html,body,#app{height:100%;margin:0}
      #overlay{position:absolute;top:16px;left:16px;color:#fff}
    </style>
</head>
<body>
<div id="app"></div>
<div id="overlay"></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js';

const container = document.getElementById('app');
const overlay = document.getElementById('overlay');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 3);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(5,10,7);
scene.add(dir);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.minDistance = 1.5;
controls.maxDistance = 6;
controls.autoRotate = false;

const loader = new GLTFLoader();
loader.load('model.glb', gltf => {
  const model = gltf.scene;
  model.traverse(n => { if (n.isMesh) n.castShadow = true; });
  // center and scale
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3()).length();
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
  model.scale.multiplyScalar(1 / size * 2.0);
  scene.add(model);

  // map yaw to content
  function updateOverlay() {
    const yaw = model.rotation.y % (Math.PI*2);
    const deg = THREE.MathUtils.radToDeg(yaw);
    let info = 'Front';
    if (deg > 45 && deg < 135) info = 'Right panel';
    else if (deg > 135 || deg < -135) info = 'Back';
    else if (deg < -45 && deg > -135) info = 'Left panel';
    overlay.textContent = info;
  }

  // sync overlay while user rotates
  renderer.setAnimationLoop(() => {
    // if user uses controls, rotate model instead of camera for consistent mapping
    if (controls.isMouseDown || controls.target) {
      // optional: apply camera orbit to model rotation
    }
    updateOverlay();
    renderer.render(scene, camera);
  });
}, undefined, e => console.error(e));
window.addEventListener('resize', ()=> {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
