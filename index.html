<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Profile | Guillermo Rayas Monroy</title>
    
    <style>
        /* Minimalist reset and centering */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: white; /* Soft off-white background */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Container to frame your 3D cube */
        .model-container {
            width: 100%;
            max-width: 900px;
            height: 70vh; /* Takes up 70% of the viewport height */
            background: aqua;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            padding: 20px;
        }

        /* Essential model-viewer styling */
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent; /* Prevents gray flash on load */
        }
    </style>

    <script type="module" src="model-viewer.min.js"></script>
</head>
<body>

    <div class="model-container">
        <model-viewer 
            src="model.glb" 
            alt="Interactive 3D Portfolio Cube" 
            camera-controls 
            auto-rotate 
            camera-orbit="0deg 90deg 10m"
                      disable-zoom
            rotation-per-second="20deg"
            shadow-intensity="1"
            interaction-prompt="auto">
        </model-viewer>
    </div>

</body>
</html>
